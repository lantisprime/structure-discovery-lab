<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Structure Lab · Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,500;0,600;1,500&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#0071e3; --accent-soft:#e8f0fd; --accent-dark:#0058b0; --accent-dark2:#3a5a8c;
  --bg:#f5f5f7; --card:#fff; --line:#e8e8ed; --line2:#e2e2e7; --hair:#f0f0f3;
  --dark:#1d1d1f; --on-dark:#f5f5f7; --dark-mut:#c9c9ce; --dark-faint:#a1a1a6;
  --ink:#1d1d1f; --ink2:#424245; --mut:#6e6e73; --mut2:#86868b; --faint:#a1a1a6;
  --guide:#4a545e; --tip:#5b6674; --green:#248a3d; --amber:#b0670a; --grey:#8e8e93;
  --serif:"Newsreader",Georgia,serif;
  --sans:"Hanken Grotesk",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
}
*{box-sizing:border-box;margin:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:0;background:none}
.mono{font-family:var(--mono)}
.serif{font-family:var(--serif)}

/* ---------------- header / nav ---------------- */
header{position:sticky;top:0;z-index:40;
  background:rgba(245,245,247,.82);backdrop-filter:saturate(160%) blur(16px);
  -webkit-backdrop-filter:saturate(160%) blur(16px);border-bottom:1px solid var(--line)}
.bar{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:20px;
  padding:13px 24px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo .sq{width:29px;height:29px;border-radius:8px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.logo .name{font-family:var(--serif);font-weight:600;font-size:18px;
  letter-spacing:-.01em;white-space:nowrap}
nav.pills{display:flex;align-items:center;gap:2px}
nav.pills a,.morebtn{padding:6px 13px;border-radius:999px;color:var(--mut);
  font-size:13.5px;font-weight:500;white-space:nowrap;background:none}
nav.pills a.on,.morebtn.on{background:var(--accent-soft);color:var(--accent)}
.morewrap{position:relative}
.morebtn{display:inline-flex;align-items:center;gap:3px}
.penddot{display:inline-flex;align-items:center;justify-content:center;
  min-width:17px;height:17px;padding:0 5px;border-radius:999px;
  background:var(--accent);color:#fff;font-size:11px;font-weight:700;
  font-family:var(--mono);margin-left:2px}
.moremenu{position:absolute;top:38px;right:0;background:#fff;border:1px solid var(--line);
  border-radius:12px;box-shadow:0 12px 32px rgba(0,0,0,.12);min-width:172px;
  padding:6px;display:none;flex-direction:column;z-index:50}
.moremenu.open{display:flex}
.moremenu a{padding:9px 12px;border-radius:8px;color:var(--ink);font-size:14px;
  display:flex;justify-content:space-between;align-items:center;gap:10px}
.moremenu a.on{color:var(--accent)}
.moremenu a:hover{background:var(--hair)}
.spacer{flex:1}
.compbtn{display:inline-flex;align-items:center;gap:7px;padding:8px 15px;
  border:1px solid var(--line2);background:#fff;border-radius:999px;
  font-size:13.5px;font-weight:500;color:var(--ink)}
.compbtn .star{color:var(--accent)}

main{max-width:1080px;margin:0 auto;padding:34px 24px 90px}
.view{animation:fadeUp .34s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ---------------- primitives ---------------- */
.eyebrow{font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;
  font-size:12px;color:var(--faint)}
h1.greet{font-family:var(--serif);font-weight:500;font-size:34px;line-height:1.12;
  letter-spacing:-.02em;max-width:640px;margin:6px 0 0}
h1.view-h1{font-family:var(--serif);font-weight:500;font-size:32px;
  letter-spacing:-.01em;margin:2px 0 18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px}
.badge{display:inline-block;padding:3px 11px;border-radius:999px;font-size:11.5px;
  font-weight:600;white-space:nowrap}
.grid{display:grid;gap:16px}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:1fr 1fr}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--accent);
  color:#fff;border-radius:12px;padding:13px 24px;font-size:14.5px;font-weight:600}
.btn.sm{padding:9px 16px;border-radius:10px;font-size:13.5px}
.btn.ghost{background:#fff;color:var(--accent);border:1px solid var(--line2)}
.rowline{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-top:6px}
.pvsec{margin-top:16px;border-top:1px solid var(--hair);padding-top:14px}
.pvh{font-weight:600;font-size:13.5px;margin-bottom:8px}
.pvbars{width:100%;height:90px;display:block}
.pvcap{font-size:11.5px;color:var(--mut2);margin:6px 0 10px;line-height:1.45}
.ptablewrap{overflow-x:auto}
.ptable{border-collapse:collapse;width:100%;font-size:12px}
.ptable th{text-align:left;color:var(--mut2);font-weight:600;padding:5px 8px;
  border-bottom:1px solid var(--line);white-space:nowrap}
.ptable td{padding:5px 8px;border-bottom:1px solid var(--hair);vertical-align:top}

/* guide banner (every view except Overview + wizard) */
.guide{display:flex;gap:12px;background:var(--accent-soft);border-radius:16px;
  padding:15px 20px;margin-bottom:22px}
.guide .f{font-family:var(--serif);color:var(--accent);font-size:19px;line-height:1;
  font-style:italic;flex:0 0 auto}
.guide b{color:var(--accent);font-size:13.5px}
.guide p{color:var(--guide);font-size:13px;margin-top:2px}
.guide .btn{margin-top:11px;padding:8px 15px;border-radius:999px;font-size:13px}

/* Overview */
.next{background:var(--dark);color:var(--on-dark);border-radius:20px;padding:26px 28px;
  display:flex;flex-wrap:wrap;gap:20px;align-items:center;
  box-shadow:0 12px 40px rgba(0,0,0,.12);margin:26px 0 0}
.next .txt{flex:1 1 260px;min-width:260px}
.next .eyebrow{color:var(--dark-faint)}
.next h2{font-family:var(--serif);font-weight:500;font-size:24px;margin:8px 0 6px}
.next p{color:var(--dark-mut);font-size:14px}
.next .btn{background:var(--accent)}
.subcap{text-align:center;color:var(--faint);font-size:12.5px;margin-top:10px}
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:22px}
.tile{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px}
.tile .val{font-family:var(--mono);font-size:27px;line-height:1.1}
.tile .val.green{color:var(--green)}
.tile .lab{color:var(--mut2);font-size:13px;margin-top:6px}
.two{display:grid;grid-template-columns:1.15fr 1fr;gap:16px;margin-top:22px}
.rightcol{display:grid;gap:16px}
.stage{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--hair)}
.stage:last-child{border-bottom:0}
.stage .dot{width:22px;height:22px;border-radius:999px;flex:0 0 auto;display:flex;
  align-items:center;justify-content:center;font-size:12px;font-family:var(--mono);
  background:var(--hair);color:var(--mut2)}
.stage .dot.done{background:var(--green);color:#fff}
.stage .dot.now{background:var(--accent);color:#fff}
.stage .st-t{font-weight:600;font-size:13.5px;display:flex;gap:8px;align-items:center}
.stage .st-d{color:var(--mut2);font-size:12.5px}
.mini-badge{font-size:10.5px;padding:1px 8px}
.start{background:var(--accent-soft);border:0;border-radius:16px;padding:22px}
.start h3{color:var(--accent-dark);font-family:var(--serif);font-weight:600;font-size:18px}
.start p{color:var(--accent-dark2);font-size:13.5px;margin:6px 0 14px}
.helpcards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:22px}
.help{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;
  cursor:pointer;text-align:left}
.help .ic{font-size:18px}
.help .t{font-weight:600;font-size:14px;margin:8px 0 4px}
.help .d{color:var(--mut2);font-size:12.5px}
.placeholder{color:var(--mut2);font-size:14px;padding:30px 0}

/* ---------------- wizard ---------------- */
.wiz-head{display:flex;flex-wrap:wrap;align-items:flex-end;gap:10px;margin-bottom:22px}
.wiz-back{font-family:var(--mono);font-size:12px;color:var(--accent);
  text-transform:uppercase;letter-spacing:.06em}
.wiz-head h1{font-family:var(--serif);font-weight:500;font-size:32px;
  letter-spacing:-.02em;margin-top:4px;width:100%}
.wiz-head .sub{color:var(--mut);font-size:14px;flex:1;min-width:220px}
.wiz-head .count{font-family:var(--mono);font-size:13px;color:var(--faint)}
.wiz-grid{display:grid;grid-template-columns:206px 1fr;gap:26px}
.stepper{position:sticky;top:86px;align-self:start;display:flex;flex-direction:column;gap:2px}
.stepper .s{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:11px}
.stepper .s.on{background:#fff;border:1px solid var(--line)}
.stepper .s .n{width:24px;height:24px;border-radius:999px;flex:0 0 auto;display:flex;
  align-items:center;justify-content:center;font-size:12px;font-family:var(--mono);
  background:var(--hair);color:var(--mut2)}
.stepper .s.on .n{background:var(--accent);color:#fff}
.stepper .s.done .n{background:var(--green);color:#fff}
.stepper .s .l{font-size:13.5px;color:var(--mut);font-weight:500}
.stepper .s.on .l{color:var(--ink);font-weight:600}
.wiz-body{min-height:400px}
.dscards{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:14px}
.dscard{border:1px solid var(--line);border-radius:16px;padding:16px;cursor:pointer;
  background:#fff;text-align:left;position:relative;transition:border-color .15s}
.dscard:hover{border-color:var(--line2)}
.dscard.on{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.dscard .kind{font-size:11px}
.dscard .nm{font-weight:600;font-size:15.5px;margin:9px 0 3px}
.dscard .hint{color:var(--mut2);font-size:12.5px;min-height:34px}
.dscard .meta{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:8px}
.dscard .tick{position:absolute;top:12px;right:12px;color:var(--accent);font-weight:700}
.spark{display:block;width:100%;height:34px;margin-top:8px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:var(--mut);margin-bottom:6px;font-weight:500}
.field input,.field textarea{width:100%;border:1px solid var(--line2);border-radius:11px;
  padding:11px 13px;font-family:inherit;font-size:14px;outline:none;background:#fff}
.field input.mono,.field textarea.mono{font-family:var(--mono)}
.field textarea{min-height:90px;resize:vertical}
.tip{display:flex;gap:9px;background:var(--accent-soft);border-radius:11px;
  padding:12px 14px;color:var(--tip);font-size:13px;margin-top:4px}
.tip .st{color:var(--accent)}
.faces{display:grid;gap:14px}
.face{border:1px solid var(--line);border-radius:16px;padding:16px 18px;background:#fff}
.face .fn{font-family:var(--serif);font-size:18px;font-weight:500}
.face .fd{color:var(--faint);font-size:12.5px;margin-bottom:10px}
.ichips{display:flex;flex-wrap:wrap;gap:8px}
.ichip{border:1px solid var(--line2);border-radius:11px;padding:7px 11px;cursor:pointer;
  font-size:12.5px;background:#fff;text-align:left}
.ichip.on{border-color:var(--accent);background:var(--accent-soft)}
.ichip .id{font-family:var(--mono);font-size:12px}
.ichip .ct{color:var(--mut2);opacity:.85;font-size:11px}
.govbar{position:sticky;bottom:16px;background:var(--dark);color:var(--on-dark);
  border-radius:14px;padding:14px 20px;box-shadow:0 8px 30px rgba(0,0,0,.16);
  display:flex;flex-wrap:wrap;gap:22px;align-items:center;margin-top:16px}
.govbar .g .k{font-family:var(--mono);text-transform:uppercase;font-size:11px;
  letter-spacing:.05em;color:var(--dark-faint)}
.govbar .g .v{font-family:var(--mono);font-size:17px}
.govbar .note{color:var(--dark-mut);font-size:12.5px;flex:1;min-width:200px}
.rev{border:1px solid var(--line);border-radius:16px;padding:20px;background:#fff}
.revrow{display:flex;justify-content:space-between;gap:12px;padding:8px 0;
  border-bottom:1px solid var(--hair);font-size:13.5px}
.revrow:last-child{border-bottom:0}
.revrow .k{color:var(--mut2)}
.revrow .v{font-family:var(--mono);text-align:right}
.branches{display:grid;gap:8px;margin:14px 0}
.branch{background:var(--hair);border-radius:11px;padding:11px 13px;font-size:13px}
.branch b{font-family:var(--mono);font-size:12px}
.accept{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;margin-top:10px}
.accept input{width:17px;height:17px;accent-color:var(--accent);margin-top:2px}
.wiz-nav{display:flex;justify-content:space-between;gap:12px;margin-top:22px}
.wiz-err{color:var(--amber);font-size:13px;margin-top:10px}
.agentrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--hair)}
.agentrow:last-child{border-bottom:0}
.agentrow .an{font-weight:600;font-size:13.5px}
.agentrow .ad{color:var(--mut2);font-size:12.5px}
.agentrow .am{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-left:auto}
.loop{display:grid;gap:8px;margin:6px 0 14px}
.loopstep{display:flex;gap:11px;align-items:center;font-size:13.5px}
.loopstep .ln{width:22px;height:22px;border-radius:999px;background:var(--accent-soft);
  color:var(--accent);font-family:var(--mono);font-size:12px;display:flex;
  align-items:center;justify-content:center;flex:0 0 auto}
.callout{background:var(--accent-soft);border-radius:12px;padding:13px 16px;
  color:var(--accent-dark2);font-size:13.5px;margin:2px 0 16px}
@media(max-width:820px){.wiz-grid{grid-template-columns:1fr}
  .stepper{position:static;flex-direction:row;overflow-x:auto;gap:6px}
  .stepper .s .l{display:none}.govbar{position:static}}

/* ---------------- experiments ---------------- */
.exp-list{padding:4px 0}
.exprow{display:grid;grid-template-columns:1.3fr 1.5fr auto;gap:14px;align-items:center;
  padding:15px 20px;border-bottom:1px solid var(--hair);cursor:pointer;width:100%;
  text-align:left;background:none}
.exprow:last-child{border-bottom:0}
.exprow:hover{background:#fcfcfd}
.exprow .rid{font-family:var(--mono);font-size:13px}
.exprow .rdate{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:2px}
.exprow .rstatus{color:var(--ink2);font-size:13.5px}
.exprow .rright{justify-self:end;display:flex;align-items:center;gap:8px}
.exprow .caretr{color:var(--faint);font-size:12px}
.expdetail{border-bottom:1px solid var(--hair);padding:4px 20px 20px;
  animation:fadeUp .25s ease}
.expdetail .di{font-size:14px;color:var(--ink2);margin:6px 0 14px;line-height:1.5}
.facts{display:grid;grid-template-columns:repeat(2,1fr);gap:10px 22px}
.fact .fk{font-family:var(--mono);text-transform:uppercase;font-size:10.5px;
  letter-spacing:.05em;color:var(--faint)}
.fact .fv{font-size:13px;margin-top:2px;word-break:break-word}
.fact .fv.mono{font-family:var(--mono);font-size:12px}
@media(max-width:600px){.exprow{grid-template-columns:1fr auto}.exprow .rstatus{display:none}
  .facts{grid-template-columns:1fr}}

/* ---------------- modal (docs / theorem cards) ---------------- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:70;display:flex;
  align-items:flex-start;justify-content:center;padding:60px 20px;overflow-y:auto;
  animation:fadeUp .2s ease}
.modal{background:#fff;border-radius:18px;max-width:720px;width:100%;padding:26px 28px;
  box-shadow:0 24px 70px rgba(0,0,0,.28)}
.modal .mx{float:right;width:30px;height:30px;border-radius:999px;background:var(--hair);
  color:var(--mut);font-size:16px}
.modal h3{font-family:var(--serif);font-weight:600;font-size:22px;margin-bottom:10px}
.md{font-size:14px;line-height:1.6;color:var(--ink2)}
.md h1,.md h2,.md h3{font-family:var(--serif);color:var(--ink);margin:14px 0 6px}
.md h1{font-size:20px}.md h2{font-size:17px}.md h3{font-size:15px}
.md code{font-family:var(--mono);font-size:12.5px;background:var(--hair);padding:1px 5px;border-radius:5px}
.md pre{background:var(--hair);padding:12px;border-radius:10px;overflow-x:auto;margin:8px 0}
.md pre code{background:none;padding:0}
.md ul{margin:6px 0 6px 20px}.md li{margin:3px 0}
.md p{margin:8px 0}
.md table{border-collapse:collapse;width:100%;margin:8px 0;font-size:12.5px;display:block;overflow-x:auto}
.md th,.md td{border:1px solid var(--line);padding:5px 8px;text-align:left}

/* ---------------- companion drawer ---------------- */
.comp{position:fixed;right:20px;bottom:20px;width:min(360px,calc(100vw - 40px));
  max-height:min(560px,78vh);background:#fff;border:1px solid #e2ddd1;
  border-radius:20px;box-shadow:0 18px 50px rgba(0,0,0,.18);
  display:none;flex-direction:column;z-index:60;animation:fadeUp .3s ease}
.comp.open{display:flex}
.comp .ch{display:flex;align-items:center;gap:8px;padding:14px 16px;
  border-bottom:1px solid var(--hair)}
.comp .ch .star{color:var(--accent)}
.comp .ch .t{font-weight:600;font-size:14.5px;flex:1}
.comp .ch .x{width:26px;height:26px;border-radius:999px;background:var(--hair);
  color:var(--mut);font-size:15px}
.comp .msgs{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:9px}
.bub{padding:9px 13px;border-radius:15px;font-size:13.5px;line-height:1.45;max-width:88%;
  white-space:pre-wrap}
.bub.u{background:var(--accent);color:#fff;align-self:flex-end;
  border-bottom-right-radius:4px;max-width:85%}
.bub.a{background:#f0f0f3;color:#2a2a2c;align-self:flex-start;border-bottom-left-radius:4px}
.chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 10px}
.chip{background:var(--accent-soft);color:var(--accent);border-radius:999px;
  padding:6px 11px;font-size:12px;font-weight:500}
.comp .in{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--hair)}
.comp .in input{flex:1;border:1px solid var(--line2);border-radius:999px;
  padding:9px 14px;font-family:inherit;font-size:13.5px;outline:none}
.comp .in .send{width:34px;height:34px;border-radius:999px;background:var(--accent);
  color:#fff;font-size:16px;flex:0 0 auto}

/* ---------------- theorems ---------------- */
.th-search{width:100%;border:1px solid var(--line2);border-radius:12px;font:inherit;
  font-size:14px;padding:12px 15px;margin:0 0 12px;background:var(--card);outline:none}
.th-faces{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
.th-face{padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:500;cursor:pointer;
  white-space:nowrap;background:#fff;border:1px solid var(--line2);color:var(--mut)}
.th-face.on{background:var(--accent-soft);color:var(--accent);border-color:transparent}
.th-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.th-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;
  cursor:pointer;text-align:left;font:inherit}
.th-card h3{font-weight:600;font-size:15px;margin:10px 0 5px;line-height:1.3}
.th-card .bl{font-size:13px;color:var(--mut);line-height:1.5}
.th-tag{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600}
.th-prop{display:inline-block;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:700;
  letter-spacing:.03em;background:#b0670a1c;color:var(--amber);margin-left:6px;vertical-align:middle}
.th-caution{background:#b0670a14;border:1px solid #b0670a33;border-radius:10px;padding:11px 13px;

<body>
<header><div class="bar" id="bar"></div></header>
<main><div id="app"></div></main>

<div class="comp" id="comp">
  <div class="ch"><span class="star">✦</span><span class="t">Lab companion</span>
    <button class="x" onclick="Comp.toggle(false)">✕</button></div>
  <div class="msgs" id="compmsgs"></div>
  <div class="chips" id="compchips"></div>
  <div class="in"><input id="compinput" placeholder="Ask about the lab…"
    onkeydown="if(event.key==='Enter')Comp.send()">
    <button class="send" onclick="Comp.send()">↑</button></div>
</div>

<script>
"use strict";
/* ============================ helpers ============================ */
const $=s=>document.querySelector(s);
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
async function api(path,opts){const r=await fetch(path,opts);const j=await r.json();
  if(j&&j.error)throw new Error(j.error);return j;}
let STATE=null, OPTS=null;
async function loadState(force){if(!STATE||force)STATE=await api("/api/state");return STATE;}

const LOGO_SVG='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" '+
  'stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">'+
  '<path d="M2 12h3l2.5-7 4 15 3-11 2 5H22"/></svg>';

/* nav model */
const PRIMARY=[["home","Overview"],["results","Experiments"],["equations","Equations"],
  ["theorems","Theorems"],["ledger","Ledger"]];
const MORE=[["agents","Agents"],["approvals","Approvals"],["admin","Admin"],["help","Help"]];
const TITLES=Object.fromEntries([...PRIMARY,...MORE].map(([id,l])=>[id,l]));
const BUILT=new Set(["home","new","results","equations","theorems","ledger","agents","approvals"]);   // grows as views land in later phases

/* ---------------- governance / evidence primitives ---------------- */
// grades are hand-authored, compound, sometimes absent: badge the first Gn
// token, keep the full string in the tooltip, neutral fallback otherwise.
function gradeToken(g){const m=/\bG([0-6])\b/.exec(g||"");return m?("G"+m[1]):null;}
function gradeColor(tok){return {G0:"#8e8e93",G1:"#8e5bd0",G2:"#0071e3",G3:"#0071e3",
  G4:"#0071e3",G5:"#248a3d",G6:"#248a3d"}[tok]||"#8e8e93";}
const GRADE_TIP={G0:"G0 · exploratory — orientation only, never a claim",
  G1:"G1 · calibrated instrument — tools verified on synthetic data",
  G2:"G2 · internal registered result",
  G3:"G3 · auditable registration (hash-committed)",
  G4:"G4 · independently reproduced by a different agent identity",
  G5:"G5 · confirmed on fresh, held-out data",G6:"G6 · decision-grade"};
function gradeBadge(g){
  const tok=gradeToken(g);
  if(!tok)return `<span class="badge" style="background:#8e8e9322;color:#6e6e73"
    title="${esc(g||"no grade — see status")}">${esc((g||"—").split(" ")[0])||"—"}</span>`;
  const c=gradeColor(tok);
  return `<span class="badge" style="background:${c}22;color:${c}"
    title="${esc(GRADE_TIP[tok]||g)} — full: ${esc(g)}">${tok}</span>`;
}
// honesty meter: never label a mildly-hot panel "looks honest". Derive from data.
function honestyRead(mp){
  const p=mp&&mp.p_meta_discrete, band=mp&&mp.sim_frac_le_05_q05_q95,
    f=mp&&mp.frac_le_05;
  if(p==null)return {p:"—",hot:false,note:"panel not built yet"};
  const hot=(band&&f!=null&&f>band[1])||p<0.05;
  return {p:(+p).toFixed(3),hot,
    note:hot?"mild #45-family excess":"looks honest",
    long:hot?"Mild left-tail excess, concentrated in the adjudicated #45 shadow "+
      "family — descriptive, not a new discovery.":
      "The live p-value population is consistent with honest null testing."};
}
function guide(line,ctaLabel,ctaHash){
  return `<div class="guide"><span class="f">ƒ</span><div>
    <b>Why this page exists</b><p>${line}</p>
    ${ctaLabel?`<a class="btn" href="#${ctaHash}">${esc(ctaLabel)}</a>`:""}</div></div>`;
}

/* ============================ shell / nav ============================ */
let MENU_OPEN=false;
function pendingCount(){return (STATE&&STATE.approvals&&STATE.approvals.pending||[]).length;}
function renderBar(){
  const cur=(location.hash||"#home").slice(1).split("/")[0];
  const moreActive=MORE.some(([id])=>id===cur);
  const pend=pendingCount();
  const pills=PRIMARY.map(([id,l])=>
    `<a href="#${id}" class="${id===cur?'on':''}">${l}</a>`).join("");
  const moreItems=MORE.map(([id,l])=>
    `<a href="#${id}" class="${id===cur?'on':''}" onclick="Nav.closeMenu()">${l}
      ${id==='approvals'&&pend?`<span class="penddot">${pend}</span>`:''}</a>`).join("");
  $("#bar").innerHTML=
    `<div class="logo" onclick="location.hash='home'">
       <span class="sq">${LOGO_SVG}</span><span class="name">Structure Lab</span></div>
     <nav class="pills">${pills}</nav>
     <div class="spacer"></div>
     <button class="compbtn" onclick="Comp.toggle()"><span class="star">✦</span>
       <span class="lbl">Companion</span></button>
     <div class="morewrap">
       <button class="morebtn ${moreActive?'on':''} ${MENU_OPEN?'menuopen':''}"
         onclick="Nav.toggleMenu(event)"><span class="morelbl">More</span>
         <span class="caret">${MENU_OPEN?'▴':'▾'}</span>
         ${pend?`<span class="penddot">${pend}</span>`:''}</button>
       <div class="moremenu ${MENU_OPEN?'open':''}">${moreItems}</div>
     </div>`;
}
const Nav={
  toggleMenu(e){e&&e.stopPropagation();MENU_OPEN=!MENU_OPEN;renderBar();},
  closeMenu(){MENU_OPEN=false;renderBar();},
};
document.addEventListener("click",e=>{
  if(MENU_OPEN&&!e.target.closest(".morewrap")){MENU_OPEN=false;renderBar();}});

/* ============================ router ============================ */
const VIEWS={};
async function route(){
  renderBar();
  const [page,...rest]=(location.hash||"#home").slice(1).split("/");
  const app=$("#app");
  if(location.protocol==="file:"){
    app.innerHTML=`<div class="card"><h2 class="serif">Open me through the server</h2>
      <p style="margin-top:8px">This console needs its local server for live data.
      In Terminal from the repo folder run <span class="mono">python3 webapp/server.py</span>
      then visit <a href="http://localhost:8787/console">localhost:8787/console</a>.</p></div>`;
    return;
  }
  app.innerHTML='<div class="view"><p class="placeholder">Loading…</p></div>';
  try{
    if(VIEWS[page])await VIEWS[page](app,rest);
    else notBuilt(app,page);
  }catch(e){renderError(app,e);}
  window.scrollTo(0,0);
}
function notBuilt(app,page){
  app.innerHTML=`<div class="view">
    <h1 class="view-h1">${esc(TITLES[page]||"Overview")}</h1>
    <div class="card"><p class="placeholder">This view is being rebuilt in the
      redesign and isn't wired up in this build yet. The current console still
      has it — open <a href="/">the classic console</a> meanwhile.</p></div></div>`;
}
function renderError(app,e){
  const net=/load failed|failed to fetch|networkerror/i.test(e.message);
  app.innerHTML=`<div class="view"><div class="card">
    <h2 class="serif">Something went wrong</h2>
    <p class="placeholder">${esc(e.message)}</p>
    ${net?`<p class="placeholder">Start the server: <span class="mono">python3 webapp/server.py</span></p>`:""}
    <button class="btn ghost sm" onclick="route()">Retry</button></div></div>`;
}
window.addEventListener("hashchange",route);

/* ============================ Overview ============================ */
function nextAction(st){
  // Priority (Codex F8): pending approvals > pipeline attention > new experiment.
  const pend=(st.approvals&&st.approvals.pending)||[];
  if(pend.length){
    const p=pend[0];
    return {eyebrow:"Right now, the lab needs one thing",
      title:"Approve the "+approvalTitle(p)+" registration",
      detail:"A registered experiment is drafted and waiting on your signature. "+
             "Nothing runs until you sign — that's the lab's integrity.",
      cta:"Review & approve",hash:"approvals"};
  }
  const cur=st.pipeline&&st.pipeline.current;
  const map={
    rerun:{title:"Approve & run the corrected rerun",cta:"Go to approvals",hash:"approvals"},
    ratify:{title:"Ratify the pending verdicts",cta:"Go to approvals",hash:"approvals"},
    eq_eval:{title:"Run the blind eval pack in a fresh agent session",
      cta:"How to run it",hash:"help"},
    eq_v4:{title:"Draft the equation-v4 registration",cta:"New experiment",hash:"new"},
  };
  const m=map[cur];
  if(m)return {eyebrow:"Right now, the lab needs one thing",
    detail:(st.pipeline.steps.find(s=>s.id===cur)||{}).detail||"",...m};
  return {eyebrow:"Right now, the lab needs one thing",
    title:"Start a new experiment",
    detail:"Nothing is blocked. The six-step wizard drafts a registration and "+
           "does the governance math for you.",cta:"New experiment",hash:"new"};
}
function approvalTitle(p){
  const t=(p.title||"").replace(/^Registration[ —-]*/i,"").trim();
  if(/corrected/i.test(p.doc||t))return "corrected-instrument rerun";
  return t?t.slice(0,48):"pending";
}
function dateEyebrow(){
  try{return new Date().toLocaleDateString('en-US',
    {weekday:'long',month:'long',day:'numeric'});}catch(e){return "Today";}
}
const STAGE_LABEL={done:["done","done"],"waiting-human":["now","now"],
  next:["next","next"],later:["later","later"]};
function stageBadge(status){
  const c=status==="done"?"var(--green)":status==="waiting-human"?"var(--accent)":
    status==="next"?"var(--amber)":"var(--grey)";
  const t={done:"done","waiting-human":"now",next:"next",later:"later"}[status]||status;
  return `<span class="badge mini-badge" style="background:${c}22;color:${c}">${t}</span>`;}

VIEWS.home=async(app)=>{
  const st=await loadState(true);
  const na=nextAction(st);
  const greet=pendingCount()
    ? "One decision is waiting for you. Everything else is calm."
    : "The lab is quiet — a good moment to start something new.";
  const h=honestyRead(st.meta_panel);

// plain-language interpretation of a run — ported verbatim from the classic app
// (index.html interpretRun); the guide promises this "plain-language interpretation".
function interpretRun(r,tests){
  const s=[],grade=(r.grade||""),st=(r.status||"");
  if(/G0/.test(grade))s.push("This was an <b>exploratory</b> run: its numbers are for orientation only and can never support a claim.");
  else if(/G1/.test(grade))s.push("This run validated <b>instruments</b> on synthetic data — it says the tools are calibrated, not anything about the real world.");
  else if(/G2|registered/i.test(grade))s.push("This was a <b>registered</b> experiment: the design was committed before execution, so its p-values are citable evidence.");
  const ps=tests.map(t=>t.raw_p).filter(p=>p!=null);
  if(ps.length){
    const small=ps.filter(p=>p<=.05).length;
    s.push(`It contributed <b>${ps.length}</b> p-value${ps.length>1?"s":""} to the ledger; ${small===0?"none":small} fell below raw 0.05${small?" (raw — the corrected threshold is stricter, so check the family correction before reading anything into it)":""}.`);
  }
  if(/NULL/i.test(st))s.push("Bottom line: <b>no structure beyond chance</b> was found — in this lab a clean null is a successful, publishable result.");
  if(/positive control/i.test(st))s.push("A physical positive control detected its known mechanism, which certifies the pipeline had power — the nulls are not for lack of trying.");
  if(/dissolv/i.test(st))s.push("An earlier flag traced back to already-known rows rather than new structure.");
  if(/ADMITTED/i.test(st))s.push("Verdict class: instruments re-admitted under tightened calibration gates.");
  return s.join(" ")||"No interpretation available for this run.";
}
function expDetail(r){
  const reg=(r.registration||"").match(/docs\/[\w./-]+\.md/);
  const tests=((STATE.ledger&&STATE.ledger.recent)||[]).filter(t=>t.run_id===r.run_id);
  const fact=(k,v,mono)=>v?`<div class="fact"><div class="fk">${esc(k)}</div>
    <div class="fv ${mono?'mono':''}">${esc(v)}</div></div>`:"";
  const facts=[
    fact("grade",r.grade,true),
    fact("real-data tests",r.real_data_tests!=null?String(r.real_data_tests):""),
    fact("datasets",(r.datasets||[]).join(", ")),
    fact("stages",r.stages,true),
    fact("seed scheme",r.seed_scheme,true),
    fact("verifiers",(r.verifiers||[]).join("; ")),
    fact("output",r.output,true),
    fact("script",r.script,true),
  ].join("");
  const pblock=tests.length?`<div class="pvsec">
    <div class="pvh">Ledgered p-values (recent window)</div>
    ${pvBars(tests)}

// per-run ledgered p-values as a small bar chart (ported from classic drawBars):
// taller bar = p closer to 1 = more null; bars at/under raw 0.05 flagged amber.
function pvBars(tests){
  const ps=tests.map(t=>t.raw_p==null?0:+t.raw_p);
  const W=460,H=90,pl=2,pr=2,pt=4,pb=4,iw=W-pl-pr,ih=H-pt-pb,n=ps.length||1;
  const bw=Math.max(2,(iw/n)*0.7);
  const bars=ps.map((p,i)=>{
    const x=pl+(i+0.5)*(iw/n)-bw/2,h=Math.max(1,p*ih),y=pt+ih-h;
    const c=p<=0.05?"var(--amber)":"var(--accent)";
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}"
      height="${h.toFixed(1)}" rx="1.5" fill="${c}"/>`;}).join("");
  return `<svg class="pvbars" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${bars}</svg>`;
}

function verdictBadge(frozen,corrected){
  const label=(corrected||frozen||"—").toString();
  const U=label.toUpperCase();

  if(/FAIL|REJECT|WITHDRAW|RETRACT/.test(U))col="var(--amber)";
  else if(/AT_FLOOR|LIMIT|INCONCLUS|UNDER/.test(U))col="var(--grey)";
  else if(/RETAIN|CONFIRM|\bPASS\b|SUPPORT|HOLD/.test(U))col="var(--green)";
  const full=[frozen,corrected].filter(Boolean).join(" → ")||"no verdict";
  return `<span class="badge mono" style="background:${col}22;color:${col};font-size:11px"
    title="${esc(full)}">${esc(label)}</span>`;
}

function chartCap(seg){
  if(seg==="resid")return "What your equation leaves unexplained — structure here means "+
    "something it misses.";

    "equation doesn't capture.";

// chart with real axis labels (y min/max, x first/last date), like the target twoLine.
function eqChart(r,seg){
  const W=460,H=190,pl=2,pr=2,pt=6,pb=6,iw=W-pl-pr,ih=H-pt-pb;
  const dates=(r.plot||{}).dates||[];
  const wrap=(body,yTop,yBot,xL,xR)=>`<div class="chartwrap">
    <div class="yax"><span>${esc(yTop)}</span><span>${esc(yBot)}</span></div>
    <div class="chartmain">
      <svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${body}</svg>
      <div class="xax"><span>${esc(xL)}</span><span>${esc(xR)}</span></div>
    </div></div>`;
  if(seg==="spec"){
    const sp=r.residual_spectrum||[];
    if(!sp.length)return wrap("","","","","");
    const per=sp.map(d=>d.period_d),sh=sp.map(d=>d.share);
    const pmn=Math.min(...per),pmx=Math.max(...per),pdr=(pmx-pmn)||1,smx=Math.max(...sh)||1;
    const topi=sh.indexOf(smx);
    const stems=sp.map((d,i)=>{
      const x=pl+((d.period_d-pmn)/pdr)*iw,y2=pt+ih-(d.share/smx)*ih;
      return `<line class="${i===topi?'peak':'stem'}" x1="${x.toFixed(1)}" y1="${(pt+ih).toFixed(1)}"
        x2="${x.toFixed(1)}" y2="${y2.toFixed(1)}"/>`;}).join("");
    const body=`<line class="axis" x1="${pl}" y1="${pt+ih}" x2="${W-pr}" y2="${pt+ih}"/>${stems}`;
    return wrap(body,(smx*100).toFixed(0)+"%","0",pmn.toFixed(1)+" d",pmx.toFixed(0)+" d");
  }
  const p=r.plot||{},ys=p.y||[],fit=p.fit||[];
  if(!ys.length)return wrap("","","","","");
  const resid=ys.map((v,i)=>v-(fit[i]||0));
  const vals=seg==="resid"?resid:ys.concat(fit);
  const vmn=Math.min(...vals),vmx=Math.max(...vals),vr=(vmx-vmn)||1,n=ys.length;
  const X=i=>pl+(n<2?0:(i/(n-1))*iw),Y=v=>pt+ih-((v-vmn)/vr)*ih;
  const path=a=>a.map((v,i)=>(i?"L":"M")+X(i).toFixed(1)+" "+Y(v).toFixed(1)).join(" ");
  let body;
  if(seg==="resid"){
    const zy=Y(0);
    body=`<line class="axis" x1="${pl}" y1="${zy.toFixed(1)}" x2="${W-pr}" y2="${zy.toFixed(1)}"/>
      <path class="resline" d="${path(resid)}"/>`;
  }else{
    body=`<path class="yline" d="${path(ys)}"/><path class="fitline" d="${path(fit)}"/>`;
    if(p.train_end_index!=null){const sx=X(p.train_end_index);
      body+=`<line class="split" x1="${sx.toFixed(1)}" y1="${pt}" x2="${sx.toFixed(1)}"
        y2="${(pt+ih).toFixed(1)}"/>`;}
  }
  return wrap(body,fmtNum(vmx),fmtNum(vmn),dates[0]||"",dates[dates.length-1]||"");
}

window.eqFit=async()=>{

  if(periods.length<1||periods.length>5){
    EQ.err="Enter 1–5 positive periods (in days).";return rerenderEq();}
  EQ.err="";EQ.busy=true;EQ.res=null;rerenderEq();

      headers:{"Content-Type":"application/json"},

// histogram / by-family, a sparkline for ledger-order sequence.
function lgBars(values){
  const W=600,H=150,pl=4,pr=4,pt=12,pb=8,iw=W-pl-pr,ih=H-pt-pb;
  const n=values.length||1,max=Math.max(1,...values);
  const step=iw/n,bw=Math.max(2,step*0.62);
  const bars=values.map((v,i)=>{
    const h=Math.max(1,(v/max)*ih),x=pl+i*step+(step-bw)/2,y=pt+ih-h;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}"
      height="${h.toFixed(1)}" rx="2.5" fill="var(--accent)"/>`;}).join("");
  return `<svg class="lgchart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${bars}</svg>`;
}
function lgSpark(values){
  const W=600,H=150,pl=4,pr=4,pt=12,pb=10,iw=W-pl-pr,ih=H-pt-pb;
  const n=values.length;
  if(!n)return `<svg class="lgchart" viewBox="0 0 ${W} ${H}"></svg>`;
  const X=i=>pl+(n===1?iw/2:(i/(n-1))*iw), Y=v=>pt+ih-Math.max(0,Math.min(1,v))*ih;
  const pts=values.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
  const y05=Y(0.05).toFixed(1);
  return `<svg class="lgchart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <line x1="${pl}" y1="${y05}" x2="${W-pr}" y2="${y05}" stroke="var(--amber)"
      stroke-width="1" stroke-dasharray="5 4" opacity=".55" vector-effect="non-scaling-stroke"/>
    <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="1.6"
      stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/></svg>`;
}

const JOB_CAT={
  gates:["🛡","Gates & health","Run before publishing anything — all three must PASS."],
  executors:["▶","Registered executors","Real experiments. Each is self-gated: it "+
    "refuses to run without an approved registration."],

  maintenance:["🧹","Maintenance","Git hygiene and ledger upkeep."]};
const AG_ROLES=[["analyst","🔬 Analyst — design & interpret (deep)"],

  ["reviewer","🛡 Reviewer — adversarial check (deep)"]];
let _agTimer=null, _openLog=null;

// Job status → colour. Distinct from verdictBadge: a job is running/done/failed/
// cancelled, and "done" must read green (verdictBadge would grey it).
function agStatusBadge(s){
  const u=String(s||"").toLowerCase();
  let c="#8e8e93";
  if(u.includes("run"))c="#0071e3"; else if(u.includes("done"))c="#248a3d";
  else if(u.includes("fail")||u.includes("cancel"))c="#b0670a";
  return `<span class="badge" style="background:${c}1c;color:${c}">${esc(s||"—")}</span>`;
}

async function agPoll(){
  if(!(location.hash||"").includes("agents")){clearInterval(_agTimer);return;}
  let J,a;
  try{[J,a]=await Promise.all([api("/api/jobs"),api("/api/agents")]);}catch(e){return;}
  if(!$("#ag-jobs"))return;
  agRenderJobs(J); agRenderRunning(a);
  if(_openLog)showLog(_openLog,true);
}

window.runJob=async(name,needs)=>{
  needs=needs||[];
  const params={};
  if(needs.includes("message")){
    const m=await promptModal("Commit message","add + commit docs/results/src/… — 5–400 chars");
    if(m==null)return; params.message=m;
  }
  try{const j=await api("/api/jobs",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({job:name,params})});
    _openLog=j.id;toast(`Started: ${j.label||name}`);await agPoll();showLog(j.id,true);
  }catch(e){toast(e.message);}
};
window.runGates=async()=>{
  try{const J=await api("/api/jobs");
    const gates=(J.defs.gates||[]).map(d=>d.name);
    if(!gates.length)return toast("No gate jobs registered");
    let last=null;
    for(const n of gates){
      try{const j=await api("/api/jobs",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({job:n,params:{}})});last=j.id;}catch(e){/* already running */}
    }
    if(last)_openLog=last;
    toast("Gates launched — watch the logs");await agPoll();if(last)showLog(last,true);
  }catch(e){toast(e.message);}
};
window.runAgentTask=async()=>{
  const t=($("#ag-task").value||"").trim();
  if(t.length<10)return toast("Describe the task (≥10 characters)");
  // Send task + role; the role's provider/model/effort come from Admin config
  // (fixes the classic app, which read a non-existent #agent-provider).
  const role=($("#ag-role")||{}).value||"analyst";
  try{const j=await api("/api/jobs",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({job:"agent_task",params:{task:t,role}})});
    _openLog=j.id;toast("Agent launched — watch its log");await agPoll();showLog(j.id,true);
  }catch(e){toast(e.message);}
};
window.sendAudit=async()=>{
  const q=($("#ag-q").value||"").trim();
  if(q.length<5)return toast("Write the audit question first");
  try{const j=await api("/api/jobs",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({job:"agent_reply",
        params:{reply:q,transcript:($("#ag-tr")||{}).value,role:"reviewer"}})});
    _openLog=j.id;toast("Audit reply requested — watch the log");await agPoll();showLog(j.id,true);
  }catch(e){toast(e.message);}
};
window.showLog=async(id,quiet)=>{
  _openLog=id;
  try{const l=await api("/api/joblog?id="+encodeURIComponent(id));
    const v=$("#ag-log");if(!v)return;
    v.innerHTML=`<div class="ag-logcard">

};
window.cancelJob=async id=>{
  try{await api("/api/jobs/cancel",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({id})});

    toast(r.doc_patched?"Approved — registration line signed"
                       :"Approved — recorded to audit log");
    await loadState(true);            // refresh pending count for the nav dot
    await VIEWS.approvals($("#app")); // re-render with the fresh queue + log
    renderBar();
  }catch(e){toast(e.message);}
};

/* ---------------- toast + prompt modal (shared) ---------------- */
let _toastT=null;
function toast(msg){
  let t=$("#toast");
  if(!t){t=document.createElement("div");t.id="toast";t.className="toast";
    document.body.appendChild(t);}
  t.textContent=String(msg);t.classList.add("on");
  clearTimeout(_toastT);_toastT=setTimeout(()=>t.classList.remove("on"),3200);
}
window.toast=toast;
// Modal-based prompt (native prompt() blocks and can't be driven in tests).
function promptModal(title,placeholder){
  return new Promise(res=>{
    let settled=false; const done=v=>{if(settled)return;settled=true;closeModal();res(v);};
    openModal(`<button class="mx" onclick="closeModal()">✕</button>
      <h3>${esc(title)}</h3>
      <div class="field" style="margin-top:12px"><input id="pm-input"
        placeholder="${esc(placeholder||"")}" autocomplete="off"></div>
      <div style="display:flex;gap:10px;margin-top:4px">
        <button class="btn sm" id="pm-ok">OK</button>
        <button class="btn ghost sm" id="pm-cancel">Cancel</button></div>`);
    $("#pm-ok").onclick=()=>done(($("#pm-input").value||"").trim());
    $("#pm-cancel").onclick=()=>done(null);
    $("#pm-input").addEventListener("keydown",e=>{
      if(e.key==="Enter")done(($("#pm-input").value||"").trim());});
    $("#pm-input").focus();
  });
}

/* ---------------- markdown + modal (shared) ---------------- */
// Only allow safe link schemes (http/https/mailto), fragments, and relative
// paths. Anything with an unknown scheme (e.g. javascript:) is neutralized to
// "#" so user-authored card bodies/references can't inject an active link.
function safeUrl(u){const t=String(u||"").trim();
  if(/^(https?:|mailto:|#|\/|\.\/|\.\.\/)/i.test(t))return t;
  if(/^[a-z][a-z0-9+.-]*:/i.test(t))return "#";   // has a scheme, not allow-listed
  return t;}                                        // scheme-less → relative, allowed
function mdInline(s){return esc(s).replace(/\*\*(.+?)\*\*/g,"<b>$1</b>")
  .replace(/`([^`]+)`/g,"<code>$1</code>")
  .replace(/\[([^\]]+)\]\(([^)]+)\)/g,(m,txt,url)=>
    `<a href="${safeUrl(url)}" target="_blank" rel="noopener">${txt}</a>`);}
function mdTable(rows){
  const cells=r=>r.trim().replace(/^\||\|$/g,"").split("|").map(c=>c.trim());
  if(rows.length<2)return "<p>"+rows.map(mdInline).join("<br>")+"</p>";
  const head=cells(rows[0]),body=rows.slice(2);
  return "<table><thead><tr>"+head.map(h=>"<th>"+mdInline(h)+"</th>").join("")+
    "</tr></thead><tbody>"+body.map(r=>"<tr>"+cells(r).map(c=>"<td>"+mdInline(c)+
    "</td>").join("")+"</tr>").join("")+"</tbody></table>";
}
function mdlite(src){
  const L=String(src||"").replace(/\r/g,"").split("\n");let out=[],i=0;
  while(i<L.length){
    const l=L[i];
    if(/^```/.test(l)){let c=[];i++;while(i<L.length&&!/^```/.test(L[i])){c.push(esc(L[i]));i++;}i++;
      out.push("<pre><code>"+c.join("\n")+"</code></pre>");continue;}
    const h=/^(#{1,3})\s+(.*)/.exec(l);
    if(h){out.push(`<h${h[1].length}>${mdInline(h[2])}</h${h[1].length}>`);i++;continue;}
    if(/^\s*\|.*\|\s*$/.test(l)){let rows=[];
      while(i<L.length&&/^\s*\|.*\|\s*$/.test(L[i])){rows.push(L[i]);i++;}out.push(mdTable(rows));continue;}
    if(/^\s*[-*]\s+/.test(l)){let it=[];
      while(i<L.length&&/^\s*[-*]\s+/.test(L[i])){it.push(mdInline(L[i].replace(/^\s*[-*]\s+/,"")));i++;}
      out.push("<ul>"+it.map(x=>"<li>"+x+"</li>").join("")+"</ul>");continue;}
    if(/^\s*$/.test(l)){i++;continue;}
    let p=[];while(i<L.length&&!/^\s*$/.test(L[i])&&
      !/^(#{1,3}\s|```|\s*\||\s*[-*]\s)/.test(L[i])){p.push(mdInline(L[i]));i++;}
    out.push("<p>"+p.join("<br>")+"</p>");
  }
  return out.join("\n");
}
function openModal(html){closeModal();
  const o=document.createElement("div");o.className="overlay";o.id="overlay";
  o.innerHTML=`<div class="modal">${html}</div>`;
  o.addEventListener("click",e=>{if(e.target===o)closeModal();});
  document.body.appendChild(o);document.body.classList.add("modal-open");}
window.closeModal=()=>{const o=document.getElementById("overlay");if(o)o.remove();
  document.body.classList.remove("modal-open");};
document.addEventListener("keydown",e=>{if(e.key==="Escape")window.closeModal();});
window.openDoc=async(name,title)=>{
  try{const d=await api("/api/doc?name="+encodeURIComponent(name));
    openModal(`<button class="mx" onclick="closeModal()">✕</button>
      <h3>${esc(title||name)}</h3><div class="md">${mdlite(d.body)}</div>`);
  }catch(e){openModal(`<button class="mx" onclick="closeModal()">✕</button>
    <p class="placeholder">Couldn't open ${esc(name)} — ${esc(e.message)}</p>`);}
};

/* ============================ companion ============================ */
const Comp={
  msgs:[{role:"assistant",content:"Hi — I'm your lab companion. The Overview "+
    "always shows the single next step; ask me anytime what something means."}],
  open:false,busy:false,
  toggle(v){this.open=v==null?!this.open:v;$("#comp").classList.toggle("open",this.open);
    if(this.open)this.render();},
  ask(q){this.toggle(true);$("#compinput").value=q;this.send();},
  render(){
    $("#compmsgs").innerHTML=this.msgs.map(m=>
      `<div class="bub ${m.role==='user'?'u':'a'}">${esc(m.content)}</div>`).join("")+
      (this.busy?`<div class="bub a">…</div>`:"");
    $("#compchips").innerHTML=["What should I do next?","What does a null mean?",
      "Explain the honesty meter"].map(c=>
      `<button class="chip" onclick="Comp.ask('${c.replace(/'/g,"\\'")}')">${c}</button>`).join("");
    const m=$("#compmsgs");m.scrollTop=m.scrollHeight;},
  async send(){
    const inp=$("#compinput");const t=(inp.value||"").trim();
    if(!t||this.busy)return;inp.value="";
    this.msgs.push({role:"user",content:t});this.busy=true;this.render();
    try{
      const page=(location.hash||"#home").slice(1).split("/")[0];
      const r=await api("/api/companion",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({messages:this.msgs.slice(-12),page})});
      this.busy=false;
      if(r.setup_needed)this.msgs.push({role:"assistant",
        content:(r.hint||"Set up the Companion role in Admin first.")});
      else this.msgs.push({role:"assistant",content:r.reply||"(no reply)"});
    }catch(e){this.busy=false;
      this.msgs.push({role:"assistant",content:"I couldn't reach my provider — "+
        "check the Companion role's key in Admin. ("+e.message+")"});}
    this.render();
  },
};
