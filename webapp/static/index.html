<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Structure Discovery Lab</title>
<style>
:root{
  --bg:#f5f5f7; --card:#ffffff; --ink:#1d1d1f; --ink2:#6e6e73; --line:#e8e8ed;
  --accent:#0071e3; --accent-ink:#ffffff; --ok:#34c759; --warn:#ff9f0a;
  --bad:#ff3b30; --tint:rgba(0,113,227,.08); --nav:rgba(251,251,253,.8);
  --radius:18px; --shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.06);
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#000; --card:#1c1c1e; --ink:#f5f5f7; --ink2:#98989d;
    --line:#2c2c2e; --tint:rgba(10,132,255,.16); --nav:rgba(22,22,23,.8);
    --accent:#0a84ff; --shadow:0 1px 2px rgba(0,0,0,.5),0 8px 24px rgba(0,0,0,.4);}
}
*{box-sizing:border-box;margin:0}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;
  padding-bottom:calc(64px + env(safe-area-inset-bottom))}
a{color:var(--accent);text-decoration:none}
h1{font-size:32px;font-weight:700;letter-spacing:-.02em;line-height:1.15}
h2{font-size:21px;font-weight:600;letter-spacing:-.01em;margin:0 0 6px}
h3{font-size:16px;font-weight:600}
.small{font-size:13px;color:var(--ink2)}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px}

header{position:sticky;top:0;z-index:40;background:var(--nav);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--line)}
.nav{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:18px;
  padding:10px 20px}
.brand{font-weight:700;letter-spacing:-.02em;white-space:nowrap}
.brand span{color:var(--accent)}
.navlinks{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
.navlinks::-webkit-scrollbar{display:none}
.navlinks a{padding:6px 12px;border-radius:999px;color:var(--ink2);
  font-size:13.5px;font-weight:500;white-space:nowrap}
.navlinks a.on{background:var(--tint);color:var(--accent)}

main{max-width:1080px;margin:0 auto;padding:28px 20px 60px}
.hero{margin:14px 0 26px}
.hero p{color:var(--ink2);max-width:640px;margin-top:6px}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.g3{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:20px;border:1px solid var(--line)}
.card h2{display:flex;align-items:center;gap:8px}
.rowline{display:flex;justify-content:space-between;gap:12px;padding:9px 0;
  border-bottom:1px solid var(--line);align-items:baseline}
.rowline:last-child{border-bottom:0}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;
  font-weight:600;background:var(--tint);color:var(--accent);white-space:nowrap}
.badge.ok{background:rgba(52,199,89,.14);color:var(--ok)}
.badge.warn{background:rgba(255,159,10,.15);color:var(--warn)}
.badge.bad{background:rgba(255,59,48,.13);color:var(--bad)}
.badge.dim{background:var(--line);color:var(--ink2)}
button,.btn{font:inherit;font-weight:600;font-size:14px;border:0;cursor:pointer;
  background:var(--accent);color:var(--accent-ink);padding:10px 18px;
  border-radius:999px;transition:transform .06s ease,opacity .15s}
button:active{transform:scale(.97)}
button.ghost{background:var(--tint);color:var(--accent)}
button.subtle{background:var(--line);color:var(--ink)}
button:disabled{opacity:.45;cursor:default}
input,select,textarea{font:inherit;width:100%;padding:10px 14px;border-radius:12px;
  border:1px solid var(--line);background:var(--card);color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:0;border-color:transparent}
label{font-size:13px;font-weight:600;color:var(--ink2);display:block;margin:12px 0 5px}

.steps{display:flex;flex-direction:column;gap:0;position:relative}
.step{display:flex;gap:14px;padding:14px 0;position:relative}
.step .dot{width:26px;height:26px;border-radius:50%;flex:0 0 26px;display:flex;
  align-items:center;justify-content:center;font-size:13px;font-weight:700;
  background:var(--line);color:var(--ink2);z-index:1}
.step.done .dot{background:var(--ok);color:#fff}
.step.next .dot{background:var(--accent);color:#fff;box-shadow:0 0 0 5px var(--tint)}
.step.waiting-human .dot{background:var(--warn);color:#fff}
.step:not(:last-child):before{content:"";position:absolute;left:12px;top:40px;
  bottom:-14px;width:2px;background:var(--line)}
.step .body{flex:1}
.step .body .small{margin-top:2px}

table{width:100%;border-collapse:collapse;font-size:13.5px}
th{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2);
  text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
tr:last-child td{border-bottom:0}
.tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.clickable{cursor:pointer}
.clickable:hover{background:var(--tint)}

.seg{display:inline-flex;background:var(--line);border-radius:999px;padding:3px;gap:2px}
.seg button{background:transparent;color:var(--ink2);padding:6px 14px;font-size:13px}
.seg button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.12)}

.searchbar{display:flex;gap:10px;margin:14px 0}
.searchbar input{flex:1}
canvas{width:100%;height:220px;display:block}
details{border-top:1px solid var(--line);padding:10px 0}
details summary{cursor:pointer;font-weight:600;list-style:none}
details summary::-webkit-details-marker{display:none}
details summary:before{content:"▸ ";color:var(--ink2)}
details[open] summary:before{content:"▾ "}
.md{font-size:14px}
.md h1,.md h2,.md h3{margin:18px 0 8px}
.md h1{font-size:22px}.md h2{font-size:18px}.md h3{font-size:15px}
.md p,.md li{margin:6px 0;color:var(--ink)}
.md code{background:var(--tint);border-radius:6px;padding:1px 6px;font-size:12.5px;
  font-family:ui-monospace,Menlo,monospace}
.md pre{background:var(--line);border-radius:12px;padding:14px;overflow-x:auto}
pre{white-space:pre-wrap;word-break:break-word;max-width:100%}
.md table{margin:10px 0}
.toast{position:fixed;left:50%;bottom:86px;transform:translateX(-50%);z-index:60;
  background:var(--ink);color:var(--bg);padding:11px 20px;border-radius:999px;
  font-size:14px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;
  max-width:88vw;text-align:center}
.toast.show{opacity:1}
.kpi{font-size:26px;font-weight:700;letter-spacing:-.02em}
.kpi + .small{margin-top:2px}
.pillrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}

.info{display:inline-flex;align-items:center;justify-content:center;
  width:16px;height:16px;border-radius:50%;background:var(--line);color:var(--ink2);
  font-size:11px;font-weight:700;cursor:help;position:relative;vertical-align:1px;
  margin-left:5px;outline:none}
.info:hover,.info:focus{background:var(--accent);color:#fff}
.info::after{content:attr(data-tip);position:absolute;bottom:130%;left:50%;
  transform:translateX(-50%);background:var(--ink);color:var(--bg);
  padding:8px 12px;border-radius:10px;font-size:12px;font-weight:400;
  width:max-content;max-width:min(280px,80vw);white-space:normal;line-height:1.4;
  opacity:0;pointer-events:none;transition:opacity .15s;z-index:65;text-align:left}
.info:hover::after,.info:focus::after{opacity:1}
.guide{background:var(--tint);border:1px solid transparent;border-radius:var(--radius);
  padding:14px 18px;margin-bottom:16px;display:flex;gap:12px;align-items:flex-start}
.guide .gico{font-size:20px;line-height:1.3}
.guide b{color:var(--accent)}
.guide .small{margin-top:2px}
.nextchip{display:inline-flex;align-items:center;gap:8px;background:var(--accent);
  color:#fff;border-radius:999px;padding:6px 14px;font-size:13px;font-weight:600;
  cursor:pointer;white-space:nowrap}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:70;display:flex;
  align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.overlay .card{max-width:440px;width:100%}
.fab{position:fixed;right:18px;bottom:18px;z-index:55;width:52px;height:52px;
  border-radius:50%;background:var(--accent);color:#fff;font-size:24px;border:0;
  box-shadow:0 6px 20px rgba(0,0,0,.25);cursor:pointer;display:flex;
  align-items:center;justify-content:center}
.chatpanel{position:fixed;right:18px;bottom:80px;z-index:56;width:min(360px,calc(100vw - 36px));
  max-height:min(520px,70vh);background:var(--card);border:1px solid var(--line);
  border-radius:20px;box-shadow:0 12px 40px rgba(0,0,0,.3);display:flex;
  flex-direction:column;overflow:hidden}
.chatpanel header{position:static;display:flex;justify-content:space-between;
  align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);
  background:var(--card)}
.chatlog{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:85%;padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.45}
.msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg.bot{align-self:flex-start;background:var(--line);border-bottom-left-radius:4px}
.chatin{display:flex;gap:8px;padding:10px;border-top:1px solid var(--line)}
.chatin input{flex:1}
.chips{display:flex;gap:6px;flex-wrap:wrap;padding:0 14px 10px}
.chips button{background:var(--tint);color:var(--accent);font-size:12px;padding:6px 10px}
@media (max-width:760px){.fab{bottom:calc(74px + env(safe-area-inset-bottom))}
  .chatpanel{bottom:calc(136px + env(safe-area-inset-bottom))}}
nav.tabbar{display:none}
@media (max-width:760px){
  main{padding:18px 14px 90px}
  h1{font-size:26px}
  .navlinks{display:none}
  nav.tabbar{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:50;
    background:var(--nav);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-top:1px solid var(--line);justify-content:space-around;
    padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
  nav.tabbar a{display:flex;flex-direction:column;align-items:center;gap:2px;
    font-size:10px;color:var(--ink2);padding:4px 6px;border-radius:10px;min-width:52px}
  nav.tabbar a.on{color:var(--accent)}
  nav.tabbar .ico{font-size:20px;line-height:1}
}
@media print{
  header,nav.tabbar,.noprint,button{display:none !important}
  body{background:#fff;color:#000;padding:0}
  .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid}
  main{max-width:100%}
  .printonly{display:block !important}
}
.printonly{display:none}
</style>
</head>
<body>
<header>
  <div class="nav">
    <div class="brand">Structure<span> Lab</span></div>
    <div class="navlinks" id="navlinks"></div>
  </div>
</header>

<main id="app"><div class="hero"><h1>Loading…</h1></div></main>

<nav class="tabbar" id="tabbar"></nav>
<button class="fab noprint" id="fab" onclick="toggleChat()" title="Ask the companion">💬</button>
<div class="chatpanel noprint" id="chatpanel" style="display:none">
  <header><b>💬 Lab companion</b>
    <button class="subtle" style="padding:4px 12px" onclick="toggleChat()">✕</button></header>
  <div class="chatlog" id="chatlog"></div>
  <div class="chips" id="chatchips"></div>
  <div class="chatin">
    <input id="chatin" placeholder="Ask anything about the lab…"
      onkeydown="if(event.key==='Enter')sendChat()">
    <button onclick="sendChat()">↑</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================ shell ============================ */
const PAGES = [
  ["home","Overview","⌂"],["experiments","Experiments","▤"],
  ["equations","Equations","ƒ"],["theorems","Theorems","∑"],
  ["ledger","Ledger","☰"],["agents","Agents","◎"],
  ["approvals","Approvals","✓"],["admin","Admin","⚙"],["help","Help","?"]
];
const MOBILE_TABS = ["home","experiments","equations","theorems","ledger","help"];
const $ = s => document.querySelector(s);
const el = (t,c,h) => {const e=document.createElement(t); if(c)e.className=c;
  if(h!==undefined)e.innerHTML=h; return e;};
const esc = s => String(s??"").replace(/[&<>"]/g,
  c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmtp = p => p==null?"—":(+p).toFixed(p<0.01?4:3);
let STATE=null, KB=null;

function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),2600);}
async function api(path,opts){const r=await fetch(path,opts);
  const j=await r.json(); if(j&&j.error)throw new Error(j.error); return j;}
async function loadState(force){ if(!STATE||force)STATE=await api("/api/state");
  return STATE;}

function nav(){
  const cur=(location.hash||"#home").slice(1).split("/")[0];
  $("#navlinks").innerHTML=PAGES.map(([id,label])=>
    `<a href="#${id}" class="${id===cur?'on':''}">${label}</a>`).join("");
  $("#tabbar").innerHTML=PAGES.filter(p=>MOBILE_TABS.includes(p[0]))
    .map(([id,label,ico])=>`<a href="#${id}" class="${id===cur?'on':''}">
      <span class="ico">${ico}</span>${label}</a>`).join("");
}
async function route(){
  nav(); const app=$("#app");
  const [page,...rest]=(location.hash||"#home").slice(1).split("/");
  app.innerHTML='<div class="hero"><h1 class="small">Loading…</h1></div>';
  if(location.protocol==="file:"){
    app.innerHTML=`<div class="card"><h2>Open me through the server</h2>
      <p>This console needs its local server for live lab data — opening the
      HTML file directly can't reach it.</p>
      <p class="small" style="margin-top:10px"><b>1.</b> In Terminal, from the
      repo folder:</p>
      <pre class="mono">python3 webapp/server.py</pre>
      <p class="small"><b>2.</b> Then visit
      <a href="http://localhost:8787">http://localhost:8787</a></p>
      <p class="small" style="margin-top:10px">On your phone (same Wi-Fi):
      start with <code>python3 webapp/server.py --lan</code> and visit
      <code>http://&lt;your-mac-ip&gt;:8787</code>.</p></div>`;
    return;
  }
  try{
    const fn = ROUTES[page]||ROUTES.home;
    await fn(app,rest);
  }catch(e){
    if(/^not found$/i.test(e.message)){
      app.innerHTML=`<div class="card"><h2>Restart the server</h2>
        <p>This page is newer than the server process that's running — it's
        answering, but it doesn't know the newer features yet (that's why
        some tabs say “not found”).</p>
        <p class="small" style="margin-top:10px"><b>Fix (10 seconds):</b> go
        to the Terminal window running the lab, press <b>Ctrl-C</b>, then
        start it again — or double-click <b>Start Lab Console.command</b> —
        and reload this page.</p>
        <button class="ghost" onclick="route()">I restarted it — retry</button>
      </div>`;
      return;
    }
    const netfail=/load failed|failed to fetch|networkerror/i.test(e.message);
    app.innerHTML=`<div class="card"><h2>Something went wrong</h2>
      <p class="small">${esc(e.message)}</p>
      ${netfail?`<p class="small">The API didn't answer. Start the server
        from the repo folder and reload:</p>
        <pre class="mono">python3 webapp/server.py</pre>
        <p class="small">Viewing from a phone? The server binds localhost by
        default — start it with <code>--lan</code> to allow your Wi-Fi
        network, then open <code>http://&lt;your-mac-ip&gt;:8787</code>.</p>`
      :`<p class="small">Is the server running from the repo root?
        <code>python3 webapp/server.py</code></p>`}
      <button class="ghost" onclick="route()">Retry</button></div>`;
  }
  window.scrollTo(0,0);
}
window.addEventListener("hashchange",route);

/* ROUTES defined in the second script block */
</script>
<script id="routes-and-pages">
"use strict";
/* ============================ shared widgets ============================ */
/* guided experience: every page opens with WHY it exists + WHAT to do next */
function nextAction(st){
  const cur=st?.pipeline?.current;
  return {
    rerun:{label:"Approve & run the corrected rerun",hash:"approvals"},
    ratify:{label:"Ratify the pending verdicts",hash:"approvals"},
    eq_eval:{label:"Next: run the blind eval pack in a FRESH agent session",hash:"help"},
    eq_v4:{label:"Next: draft the equation-v4 registration",hash:"new"},
  }[cur]||{label:"Start a new experiment",hash:"new"};
}
function info(tip){return `<span class="info" tabindex="0" data-tip="${esc(tip)}">i</span>`;}
function guide(icon,title,lines,cta,helpId){
  return `<div class="guide noprint"><div class="gico">${icon}</div>
    <div style="flex:1"><b>${title}</b>
      <div class="small">${lines}</div>
      ${cta?`<div class="pillrow" style="margin-top:8px">${cta}</div>`:""}
    </div>
    ${helpId?`<a href="#help/${helpId}" class="small" style="white-space:nowrap;align-self:flex-start">ⓘ Help</a>`:""}
    </div>`;
}
function ctaBtn(label,hash){
  return `<span class="nextchip" onclick="location.hash='${hash}'">${esc(label)} →</span>`;
}
function interpretRun(r,tests){
  const s=[],grade=(r.grade||""),st=(r.status||"");
  if(/G0/.test(grade))s.push("This was an <b>exploratory</b> run: its numbers are for orientation only and can never support a claim.");
  else if(/G1/.test(grade))s.push("This run validated <b>instruments</b> on synthetic data — it says the tools are calibrated, not anything about the real world.");
  else if(/G2|registered/i.test(grade))s.push("This was a <b>registered</b> experiment: the design was committed before execution, so its p-values are citable evidence.");
  const ps=tests.map(t=>t.raw_p).filter(p=>p!=null);
  if(ps.length){
    const small=ps.filter(p=>p<=.05).length;
    s.push(`It contributed <b>${ps.length}</b> p-value${ps.length>1?"s":""} to the ledger; ${small===0?"none":small} fell below raw 0.05${small?" (raw — the corrected threshold is stricter, so check the family correction before reading anything into it)":""}.`);
  }
  if(/NULL/i.test(st))s.push("Bottom line: <b>no structure beyond chance</b> was found — in this lab a clean null is a successful, publishable result.");
  if(/positive control/i.test(st))s.push("A physical positive control detected its known mechanism, which certifies the pipeline had power — the nulls are not for lack of trying.");
  if(/dissolv/i.test(st))s.push("An earlier flag traced back to already-known rows rather than new structure.");
  if(/ADMITTED/i.test(st))s.push("Verdict class: instruments re-admitted under tightened calibration gates.");
  return s.join(" ")||"No interpretation available for this run.";
}
function drawBars(canvas,labels,values,color){
  const dpr=devicePixelRatio||1,W=canvas.clientWidth||600,Hh=220;
  canvas.width=W*dpr;canvas.height=Hh*dpr;
  const ctx=canvas.getContext("2d");ctx.scale(dpr,dpr);
  const css=getComputedStyle(document.documentElement);
  const ink2=css.getPropertyValue("--ink2"),line=css.getPropertyValue("--line");
  const hi=Math.max(...values,1e-9),pad=26,bw=(W-pad-10)/values.length;
  ctx.strokeStyle=line;ctx.beginPath();ctx.moveTo(pad,Hh-24);ctx.lineTo(W-6,Hh-24);ctx.stroke();
  ctx.fillStyle=color||css.getPropertyValue("--accent").trim()||"#0071e3";
  values.forEach((v,i)=>{
    const h=(Hh-50)*(v/hi);
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(pad+i*bw+2,Hh-24-h,Math.max(bw-4,2),h,4);
    else ctx.rect(pad+i*bw+2,Hh-24-h,Math.max(bw-4,2),h);
    ctx.fill();});
  ctx.fillStyle=ink2;ctx.font="10px -apple-system,sans-serif";
  ctx.fillText(String(hi),2,16);
  labels.forEach((l,i)=>{ if(labels.length<=14||i%Math.ceil(labels.length/14)===0)
    ctx.fillText(String(l).slice(0,7),pad+i*bw+2,Hh-10);});
}
function stepList(pipe){
  return `<div class="steps">`+pipe.steps.map((s,i)=>`
    <div class="step ${s.status}">
      <div class="dot">${s.status==="done"?"✓":i+1}</div>
      <div class="body"><h3>${esc(s.title)}
        ${s.id===pipe.current?'<span class="badge">you are here</span>':""}
        ${s.status==="waiting-human"?'<span class="badge warn">needs owner</span>':""}
      </h3><div class="small">${esc(s.detail)}</div></div>
    </div>`).join("")+`</div>`;
}
function verdictBadge(v){
  if(!v)return '<span class="badge dim">—</span>';
  const s=String(v);
  const cls=/NULL|FAIL|UNCONF|artifact|dissolv/i.test(s)?"dim":
            /ADMITTED|SUPPORTED|PASS|done|✓/i.test(s)?"ok":
            /FLOOR|pending|EXPLORATORY|IN_PROG/i.test(s)?"warn":"";
  return `<span class="badge ${cls}">${esc(s)}</span>`;
}
function mdlite(src){
  const lines=src.split("\n"); let out=[],inCode=false,inTable=false;
  const inline=s=>esc(s)
    .replace(/`([^`]+)`/g,"<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g,"<b>$1</b>")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  for(const ln of lines){
    if(ln.startsWith("```")){inCode=!inCode;out.push(inCode?"<pre>":"</pre>");continue;}
    if(inCode){out.push(esc(ln)+"\n");continue;}
    if(/^\s*\|/.test(ln)){
      if(/^\s*\|[\s\-|:]+\|\s*$/.test(ln))continue;
      const cells=ln.trim().replace(/^\||\|$/g,"").split("|").map(c=>inline(c.trim()));
      if(!inTable){out.push("<table>");inTable=true;
        out.push("<tr>"+cells.map(c=>`<th>${c}</th>`).join("")+"</tr>");}
      else out.push("<tr>"+cells.map(c=>`<td>${c}</td>`).join("")+"</tr>");
      continue;
    } else if(inTable){out.push("</table>");inTable=false;}
    const h=ln.match(/^(#{1,3})\s+(.*)/);
    if(h){out.push(`<h${h[1].length+1}>${inline(h[2])}</h${h[1].length+1}>`);continue;}
    if(/^\s*[-*]\s+/.test(ln)){out.push(`<li>${inline(ln.replace(/^\s*[-*]\s+/,""))}</li>`);continue;}
    if(ln.trim()==="")out.push("");
    else out.push(`<p>${inline(ln)}</p>`);
  }
  if(inTable)out.push("</table>");
  return `<div class="md">${out.join("")}</div>`;
}
function drawChart(canvas,dates,series){
  const dpr=devicePixelRatio||1, W=canvas.clientWidth||600, Hh=220;
  canvas.width=W*dpr; canvas.height=Hh*dpr;
  const ctx=canvas.getContext("2d"); ctx.scale(dpr,dpr);
  const css=getComputedStyle(document.documentElement);
  const line=css.getPropertyValue("--line"), ink2=css.getPropertyValue("--ink2");
  const all=series.flatMap(s=>s.data).filter(v=>isFinite(v));
  const lo=Math.min(...all), hi=Math.max(...all), pad=28;
  const X=i=>pad+ (W-pad-10)*(i/(series[0].data.length-1||1));
  const Y=v=>Hh-22-(Hh-40)*((v-lo)/((hi-lo)||1));
  ctx.strokeStyle=line;ctx.lineWidth=1;
  for(let g=0;g<4;g++){const y=18+g*(Hh-40)/3;ctx.beginPath();ctx.moveTo(pad,y);
    ctx.lineTo(W-8,y);ctx.stroke();}
  ctx.fillStyle=ink2;ctx.font="10px -apple-system,sans-serif";
  ctx.fillText(hi.toPrecision(4),2,20);ctx.fillText(lo.toPrecision(4),2,Hh-20);
  if(dates&&dates.length){ctx.fillText(dates[0],pad,Hh-6);
    const last=dates[dates.length-1];
    ctx.fillText(last,W-8-ctx.measureText(last).width,Hh-6);}
  for(const s of series){
    ctx.strokeStyle=s.color;ctx.lineWidth=s.width||1.6;ctx.beginPath();
    s.data.forEach((v,i)=>{i?ctx.lineTo(X(i),Y(v)):ctx.moveTo(X(i),Y(v));});
    ctx.stroke();
  }
}

window.runEq=async()=>{

      ?`Your hypothesis explains real variation: on data it never saw, it predicts

      <div class="grid g3" style="margin-top:12px">
        <div><div class="kpi">${r.rmse_holdout.toPrecision(4)}</div>
          <div class="small">hold-out RMSE (last 20%)</div></div>
        <div><div class="kpi">${r.rmse_climatology_holdout.toPrecision(4)}</div>
          <div class="small">climatology baseline RMSE</div></div>
        <div><div class="kpi">${beat?"beats":"loses to"}</div>
          <div class="small">baseline ${verdictBadge(beat?"skill":"no skill")}</div></div>
      </div>
      <div class="guide" style="margin-top:12px"><div class="gico">💡</div>
        <div><b>What this means</b><div class="small">${interp}</div></div></div>
      <div class="rowline"><span class="small">recovered amplitudes</span>
        <span class="mono">${r.amplitudes.map(a=>`${a.period_d}d: ${a.amp.toPrecision(3)}`).join(" · ")}</span></div>
      <p class="small">${esc(r.disclaimer)}</p></div>`;
    $("#eq-seg").addEventListener("click",e=>{
      if(!e.target.dataset.m)return;
      $("#eq-seg .on").classList.remove("on");e.target.classList.add("on");
      renderEqChart(e.target.dataset.m);});
    renderEqChart("fit");
    $("#eq-out").scrollIntoView({behavior:"smooth"});
  }catch(e){toast(e.message)}
};
function renderEqChart(mode){
  const r=window._eqR;if(!r)return;
  const c=$("#eq-chart"),cap=$("#eq-chart-cap");
  const accent=getComputedStyle(document.documentElement)
    .getPropertyValue("--accent").trim()||"#0071e3";
  if(mode==="fit"){
    drawChart(c,r.plot.dates,[{data:r.plot.y,color:"#8e8e93",width:1.1},
      {data:r.plot.fit,color:accent,width:2}]);
    cap.textContent="Grey = observed series · blue = your equation. The last 20% was never used for fitting.";
  }else if(mode==="resid"){
    const res=r.plot.y.map((v,i)=>v-r.plot.fit[i]);
    drawChart(c,r.plot.dates,[{data:res,color:accent,width:1.4}]);
    cap.textContent="What your equation leaves unexplained. Structure here (waves, drift) = something the hypothesis misses.";
  }else{
    const res=r.plot.y.map((v,i)=>v-r.plot.fit[i]);
    const mu=res.reduce((a,b)=>a+b,0)/res.length,n=res.length;
    const P=[],L=[];
    for(let k=1;k<=Math.floor(n/2);k++){
      let re=0,im=0;
      for(let t=0;t<n;t++){const w=2*Math.PI*k*t/n;
        re+=(res[t]-mu)*Math.cos(w);im+=(res[t]-mu)*Math.sin(w);}
      P.push(re*re+im*im);L.push((n/k).toFixed(0));
    }
    drawBars(c,L,P);
    cap.textContent="Residual periodogram by period (days). A dominant bar = a leftover rhythm your equation doesn't capture.";
  }
}

window.wizNav=dir=>{
  const d=WIZ.data;
  if(dir>0){ // validate current step
    if(WIZ.step===0){
      d.run_id=$("#w-id").value.trim().toLowerCase();
      d.hypothesis=$("#w-hyp").value.trim();
      d.author=$("#w-author").value.trim();
      if(!/^[a-z0-9_]{3,40}$/.test(d.run_id))return toast("Run id: 3-40 chars, a-z 0-9 _");
      if(WIZ.opts.used_run_ids.includes(d.run_id))return toast("That run id already exists");
      if(d.hypothesis.length<20)return toast("Describe the question (≥20 chars)");
    }
    if(WIZ.step===1&&!d.claims.length)return toast("Add at least one claim");
    if(WIZ.step===2){
      d.seed=parseInt($("#w-seed").value,10);
      const {mMin}=wizMath();
      for(let i=0;i<d.claims.length;i++){
        d.claims[i].m=parseInt($("#w-m-"+i).value,10)||0;
        if(d.claims[i].m<mMin)return toast(`Claim ${i+1}: m must be ≥ ${mMin}`);
      }
      if(!d.seed)return toast("Seed required");
    }
    if(WIZ.step===3&&!$("#w-ack").checked)return toast("Accept both outcome branches to continue");
  }
  WIZ.step=Math.max(0,Math.min(4,WIZ.step+dir));
  renderWiz();
};

  const anyProv=P.providers.some(p=>p.configured&&!p.keyless)||

window.setAuth=async a=>{
  try{await api("/api/providers",{method:"POST",
    body:JSON.stringify({auth_method:a})});route();}
  catch(e){toast(e.message)}};
window.toggleProv=id=>{const el=document.getElementById("prov-"+id);
  el.style.display=el.style.display==="none"?"block":"none";};
window.saveProv=async(id,makeActive)=>{
  const body={id,active:!!makeActive,
    key:document.getElementById("pk-"+id)?.value.trim()||"",
    model:document.getElementById("pm-"+id)?.value.trim()||""};
  const b=document.getElementById("pb-"+id);if(b)body.base=b.value.trim();
  try{await api("/api/providers",{method:"POST",body:JSON.stringify(body)});
    toast(makeActive?"Saved & set active":"Saved");route();
  }catch(e){toast(e.message)}};
window.addDataset=async()=>{
  try{const r=await api("/api/datasets",{method:"POST",body:JSON.stringify({
      name:$("#ds-name").value,source:$("#ds-src").value,
      description:$("#ds-desc").value,csv_text:$("#ds-csv").value})});
    STATE=null;
    $("#ds-report").innerHTML=`<div class="guide" style="margin-top:10px">
      <div class="gico">✅</div><div><b>Validated & added</b>
      <div class="small">${r.validation.rows} rows ·
      ${esc(r.validation.date_range.join(" → "))} · column
      “${esc(r.validation.value_column)}” · ${(r.validation.missing_frac*100).toFixed(1)}% missing
      · ${r.validation.duplicate_dates} duplicate dates<br>${esc(r.next)}</div>
      <div class="pillrow"><button class="ghost" onclick="location.hash='equations'">Try it in the sandbox</button></div>
      </div></div>`;
    toast("Dataset added");
  }catch(e){$("#ds-report").innerHTML=`<p class="small" style="color:var(--bad);margin-top:8px">✕ ${esc(e.message)}</p>`}};
window.testRole=async rid=>{
  const out=document.getElementById("role-t-"+rid);
  out.textContent="testing…";
  await saveRole(rid);            // test what's on screen, not stale config
  try{const r=await api("/api/test_role",{method:"POST",
      body:JSON.stringify({role:rid})});
    out.innerHTML=r.ok
      ?`<span class="badge ok">✓ works — ${esc(r.model)} answered in ${r.latency_ms} ms</span>`
      :`<span class="badge bad">✕</span> ${esc(r.error)}`;
  }catch(e){out.innerHTML=`<span class="badge bad">✕</span> ${esc(e.message)}`}};
window.saveRole=async(rid,providerOnly)=>{
  const sel=document.getElementById("role-ms-"+rid);
  const custom=document.getElementById("role-mc-"+rid);
  const model=sel&&sel.value==="__custom__"?(custom?.value.trim()||"")
    :(sel?.value||"");
  const cfg={provider:document.getElementById("role-p-"+rid).value};
  if(!providerOnly){cfg.model=model;
    cfg.effort=document.querySelector("#role-e-"+rid+" .on")?.textContent||"balanced";}
  try{await api("/api/providers",{method:"POST",
      body:JSON.stringify({role:rid,config:cfg})});
    toast(providerOnly?"Provider set — model list updated":"Role saved");
    if(providerOnly)route();
  }catch(e){toast(e.message)}};
window.saveKeys=async keys=>{
  const payload={api_keys:{},settings:{
    anthropic_model:$("#set-ant-model")?.value.trim()||"",
    openai_base_url:$("#set-oai-url")?.value.trim()||"",
    openai_model:$("#set-oai-model")?.value.trim()||""}};
  keys.forEach(k=>{const v=$("#key-"+k).value.trim();if(v)payload.api_keys[k]=v;});
  await api("/api/config",{method:"POST",body:JSON.stringify(payload)});
  toast("Saved — keys stay on this machine");route();
};
window.delKey=async k=>{
  await api("/api/config",{method:"POST",body:JSON.stringify({api_keys:{[k]:"__delete__"}})});
  toast(k+" removed");route();
};
window.saveSettings=async()=>{
  await api("/api/config",{method:"POST",body:JSON.stringify({settings:{
    default_m:+$("#set-m").value||399,owner:$("#set-owner").value}})});
  toast("Settings saved");
};

ROUTES.help=async(app)=>{

  <div class="grid g2">
    <div class="card"><h2>The idea in one paragraph</h2>

      the <b>multiplicity ledger</b>, corrections are applied at verdict
      time, and a <b>meta panel</b> watches the whole p-value population for
      dishonesty. Flags become anomalies only after row-tracing; anomalies
      become discoveries only after confirmation on fresh data.</p></div>
    <div class="card"><h2>Your journey</h2>

    <div class="card"><h2>Exporting to PDF</h2>
      <p class="small">Every page has an <b>Export to PDF</b> button (or use

/* ---------------- AI companion ---------------- */
const CHAT={hist:JSON.parse(sessionStorage.getItem("labChat")||"[]"),busy:false};
const STARTERS=["What should I do next?","How do I start an experiment?",
  "Explain the honesty meter","What can the Run centre do?"];
async function toggleChat(){
  const p=$("#chatpanel");
  p.style.display=p.style.display==="none"?"flex":"none";
  if(p.style.display==="flex"){
    if(!CHAT.hist.length&&CHAT.needsSetup===undefined){
      try{const P=await api("/api/providers");
        const r=P.roles.companion,eff=P.providers.find(x=>x.id===(r.provider||P.active))||{};
        CHAT.needsSetup=!eff.configured;
      }catch(e){}
    }
    renderChat();$("#chatin").focus();
  }
}
function renderChat(){
  const log=$("#chatlog");
  if(!CHAT.hist.length){
    log.innerHTML=`<div class="msg bot">Hi! I'm your lab companion — ask me
      what to do next, or how any part of the console works.</div>`;
  }else{
    log.innerHTML=CHAT.hist.map(m=>
      `<div class="msg ${m.role==="user"?"user":"bot"}">${esc(m.content)}</div>`).join("");
  }
  if(CHAT.needsSetup)log.innerHTML+=`<div class="msg bot" style="background:var(--tint)">
    <b>Set me up in 30 seconds:</b><br>Admin → pick a provider → paste its key
    → under “agent roles” give <b>Companion</b> a fast model.<br>
    <button style="margin-top:8px" onclick="CHAT.needsSetup=false;toggleChat();location.hash='admin'">
    Open Admin →</button></div>`;
  if(CHAT.busy)log.innerHTML+='<div class="msg bot">…</div>';
  $("#chatchips").innerHTML=CHAT.hist.length?"":STARTERS.map(q=>
    `<button onclick="askChat('${q.replace(/'/g,"\\'")}')">${q}</button>`).join("");
  log.scrollTop=log.scrollHeight;
}
window.askChat=q=>{$("#chatin").value=q;sendChat();};
window.sendChat=async()=>{
  const inp=$("#chatin"),q=inp.value.trim();
  if(!q||CHAT.busy)return;
  inp.value="";CHAT.hist.push({role:"user",content:q});
  CHAT.busy=true;renderChat();
  try{
    const r=await api("/api/companion",{method:"POST",
      body:JSON.stringify({messages:CHAT.hist.slice(-12),
        page:(location.hash||"#home").slice(1)})});
    if(r.setup_needed){
      CHAT.hist.push({role:"assistant",content:r.hint});
      CHAT.needsSetup=true;
    }else{
      CHAT.hist.push({role:"assistant",content:r.reply});
    }
  }catch(e){
    CHAT.hist.push({role:"assistant",content:"I couldn't reach my model: "+
      e.message});
  }
  CHAT.busy=false;
  sessionStorage.setItem("labChat",JSON.stringify(CHAT.hist.slice(-20)));
  renderChat();
};
window.toggleChat=toggleChat;

window.exportPDF=()=>{toast("Opening print dialog — choose “Save as PDF”");

route();
